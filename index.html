
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real Stone & Granite | Excellence in Stone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <script>
      window.tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: 'var(--color-primary)',
              surface: 'var(--color-surface)',
              gold: 'var(--color-gold)',
              'text-main': 'var(--color-text-main)',
              'text-muted': 'var(--color-text-muted)',
            },
            borderRadius: {
              none: '0px',
              sm: '2px',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['Geist Mono', 'monospace'],
            },
            animation: {
              'shimmer': 'shimmer 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              shimmer: {
                '0%': { transform: 'translateX(-150%) skewX(-12deg)' },
                '100%': { transform: 'translateX(150%) skewX(-12deg)' },
              },
            },
          },
        },
      };
    </script>
    <style type="text/css">
      :root {
        /* OKLCH VALUES - TUNED FOR LUXURY */
        /* Deep Onyx: Darker, denser black */
        --color-primary: oklch(14% 0.01 80); 
        /* Gunmetal: Slightly lighter for cards */
        --color-surface: oklch(19% 0.01 80);
        /* Rolex Gold: Richer, less "lemon", more "brass" */
        --color-gold: oklch(74% 0.16 82);
        /* Pure White for text */
        --color-text-main: oklch(98% 0 0);
        /* Muted Grey for subtitles */
        --color-text-muted: oklch(65% 0.01 80);
      }

      body {
        margin: 0;
        background-color: var(--color-primary);
        color: var(--color-text-main);
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
      }
    </style>
    <script type="importmap">
